<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formular 1400 – Feldvergleich</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.1); padding: 40px; max-width: 640px; width: 100%; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 32px; }

  /* Upload */
  .drop-zone { border: 2px dashed #d1d5db; border-radius: 10px; padding: 40px 24px; text-align: center; cursor: pointer; transition: all .2s; position: relative; }
  .drop-zone:hover, .drop-zone.over { border-color: #4472C4; background: #f0f4ff; }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
  .drop-zone .label { font-size: 15px; color: #374151; }
  .drop-zone .hint  { font-size: 13px; color: #9ca3af; margin-top: 4px; }
  .file-name { margin-top: 12px; font-size: 13px; color: #4472C4; font-weight: 600; min-height: 20px; }

  /* Button */
  .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all .2s; margin-top: 20px; }
  .btn-primary { background: #4472C4; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #3461b0; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-success { background: #16a34a; color: #fff; }
  .btn-success:hover { background: #15803d; }

  /* Progress */
  .progress-wrap { margin-top: 28px; display: none; }
  .progress-bar-bg { background: #e5e7eb; border-radius: 99px; height: 10px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar    { height: 100%; background: #4472C4; border-radius: 99px; transition: width .4s ease; width: 0%; }
  .progress-text   { font-size: 13px; color: #6b7280; text-align: right; }

  /* Log */
  .log { margin-top: 20px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; max-height: 220px; overflow-y: auto; font-family: 'Menlo', 'Consolas', monospace; font-size: 12px; line-height: 1.6; color: #374151; display: none; }
  .log .entry { padding: 1px 0; }
  .log .entry.ok  { color: #16a34a; }
  .log .entry.err { color: #dc2626; }

  /* Status */
  .status-badge { display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 13px; font-weight: 600; margin-top: 16px; }
  .badge-running { background: #dbeafe; color: #1d4ed8; }
  .badge-done    { background: #dcfce7; color: #166534; }
  .badge-error   { background: #fee2e2; color: #991b1b; }
</style>
</head>
<body>
<div class="card">
  <h1>Formular 1400 – Feldvergleich</h1>
  <p class="subtitle">Erfassungsbogen hochladen → automatischer Scan → Vergleich als Excel</p>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="icon">📂</div>
    <div class="label">Excel-Erfassungsbogen hierher ziehen</div>
    <div class="hint">oder klicken zum Auswählen (.xlsx)</div>
  </div>
  <div class="file-name" id="fileName"></div>

  <button class="btn btn-primary" id="startBtn" disabled>Scan starten</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-text" id="progressText">Vorbereitung...</div>
    <div id="statusBadge"></div>
  </div>

  <div class="log" id="log"></div>

  <button class="btn btn-success" id="downloadBtn" style="display:none">⬇ Ergebnis herunterladen</button>
</div>

<script>
  const dropZone   = document.getElementById('dropZone');
  const fileInput  = document.getElementById('fileInput');
  const fileName   = document.getElementById('fileName');
  const startBtn   = document.getElementById('startBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar  = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');
  const statusBadge  = document.getElementById('statusBadge');
  const logEl        = document.getElementById('log');
  const downloadBtn  = document.getElementById('downloadBtn');

  let selectedFile = null;

  // Drag & Drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f && f.name.endsWith('.xlsx')) setFile(f);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

  function setFile(f) {
    selectedFile = f;
    fileName.textContent = '✓ ' + f.name;
    startBtn.disabled = false;
  }

  function addLog(msg, cls) {
    logEl.style.display = 'block';
    const d = document.createElement('div');
    d.className = 'entry' + (cls ? ' ' + cls : '');
    d.textContent = msg;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setProgress(pct, text) {
    progressBar.style.width = pct + '%';
    progressText.textContent = text;
  }

  function setBadge(type, text) {
    statusBadge.innerHTML = `<span class="status-badge badge-${type}">${text}</span>`;
  }

  startBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    // UI vorbereiten
    startBtn.disabled = true;
    downloadBtn.style.display = 'none';
    progressWrap.style.display = 'block';
    logEl.innerHTML = '';
    logEl.style.display = 'block';
    setProgress(2, 'Upload läuft...');
    setBadge('running', '⏳ Scan läuft');
    addLog('Datei wird hochgeladen...');

    // Upload
    const form = new FormData();
    form.append('excel', selectedFile);

    let jobId;
    try {
      const res  = await fetch('/start', { method: 'POST', body: form });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      jobId = data.jobId;
    } catch (e) {
      addLog('Fehler beim Upload: ' + e.message, 'err');
      setBadge('error', '✗ Fehler');
      startBtn.disabled = false;
      return;
    }

    addLog('Scan gestartet. Chrome öffnet sich...');
    setProgress(5, 'Browser startet...');

    // SSE Fortschritt
    const sse = new EventSource('/progress/' + jobId);

    sse.addEventListener('log', e => {
      const d = JSON.parse(e.data);
      addLog(d.message);
    });

    sse.addEventListener('progress', e => {
      const d = JSON.parse(e.data);
      setProgress(d.pct, d.text);
    });

    sse.addEventListener('done', e => {
      const d = JSON.parse(e.data);
      sse.close();
      setProgress(100, 'Fertig!');
      setBadge('done', '✓ Abgeschlossen');
      addLog('✓ Excel-Vergleich erfolgreich erstellt!', 'ok');
      downloadBtn.style.display = 'block';
      downloadBtn.onclick = () => window.location.href = d.downloadUrl;
      startBtn.disabled = false;
    });

    sse.addEventListener('error', e => {
      sse.close();
      try {
        const d = JSON.parse(e.data);
        addLog('Fehler: ' + d.message, 'err');
      } catch { addLog('Verbindungsfehler.', 'err'); }
      setBadge('error', '✗ Fehler');
      startBtn.disabled = false;
    });
  });
</script>
</body>
</html>
